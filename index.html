<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Calculateur salle escalade</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
margin:0;
padding:40px;
background:linear-gradient(135deg,#ff3df0,#ffe23d,#3df6ff);
}

.container{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:1fr 380px;
gap:30px;
}

.card{
background:white;
border:4px solid black;
border-radius:20px;
box-shadow:8px 8px 0 black;
padding:25px;
}

.result{
position:sticky;
top:20px;
height:fit-content;
text-align:center;
}

.big{
font-size:48px;
font-weight:900;
color:#ff3df0;
}

.small{
font-size:12px;
color:#555;
}

label{display:block;margin-top:15px;font-weight:bold;}
input,select{width:100%;padding:8px;margin-top:5px;}

</style>
</head>

<body>

<div class="container">

<div class="card">

<label>Surface</label>
<input id="surface" type="number" value="500">

<label>Hauteur</label>
<input id="hauteur" type="number" value="8">

<label>Projet</label>
<select id="mode">
<option value="neuf">Neuf</option>
<option value="reno">Rénovation</option>
</select>

<label>Linéaire mur</label>
<input id="mur" type="range" min="10" max="200" value="60">

<label>Parking</label>
<input id="parking" type="number" value="20">

<label>Vestiaires</label>
<select id="vest">
<option value="20000">Minimal</option>
<option value="40000">Standard</option>
<option value="80000">Confort</option>
</select>

<label>Chauffage</label>
<input id="chauff" type="checkbox">

<label>Ventilation</label>
<input id="vent" type="checkbox">

<label>Rafraîchissement</label>
<input id="raf" type="checkbox">

<label>Prestations</label>
<select id="prest">
<option value="1">Brut</option>
<option value="1.2">Normal</option>
<option value="1.4">Soigné</option>
</select>

</div>

<div class="card result">

<div>Budget estimatif</div>
<div class="big" id="prix">0€</div>
<div class="small" id="fourchette"></div>

</div>

</div>

<script>

function calc(){

let s=+surface.value
let h=+hauteur.value
let murml=+mur.value
let park=+parking.value
let vest=+vest.value
let prest=+prestations()

let batmin = mode.value=="neuf"?s*700:s*200
let batmax = mode.value=="neuf"?s*1300:s*400

let murbase = murml*4.9*1.2*240 +165*murml*3

let murmin=murbase
let murmax=murbase*1.2

let cvc=0
if(chauff.checked)cvc+=s/500*20000
if(vent.checked)cvc+=s/1000*170000
if(raf.checked)cvc+=s/1000*50000

let hauteurcout = h>6?(h-6)*s*35:0
let parkingcout = park*3500

let sousmin = batmin+murmin+cvc+hauteurcout+parkingcout+vest
let sousmax = batmax+murmax+cvc+hauteurcout+parkingcout+vest

let totalmin = (sousmin*1.12)*prest
let totalmax = (sousmax*1.12)*prest

let central = (totalmin+totalmax)/2

prix.innerHTML=Math.round(central)+" €"
fourchette.innerHTML=Math.round(totalmin)+" — "+Math.round(totalmax)

}

function prestations(){return +prest.value}

document.querySelectorAll("input,select").forEach(e=>e.oninput=calc)

calc()

</script>

</body>
</html>
