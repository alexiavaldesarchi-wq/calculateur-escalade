<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculateur salle escalade</title>

<style>

body{
font-family:Inter, Arial, sans-serif;
background:#ffffff;
margin:0;
padding:60px;
color:#111;
}

.container{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:420px 1fr;
gap:60px;
align-items:start;
}

.panel{
background:#f7f7f8;
border-radius:18px;
padding:30px;
}

.result{
background:#ffffff;
border-radius:22px;
padding:50px;
box-shadow:0 40px 80px rgba(0,0,0,0.08);
}

h1{
font-size:26px;
margin-bottom:25px;
}

label{
display:block;
font-size:14px;
margin-top:18px;
font-weight:600;
}

input,select{
width:100%;
padding:12px;
margin-top:6px;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
background:white;
}

input[type=range]{
accent-color:#7c3aed;
}

.checks{
margin-top:10px;
display:grid;
gap:8px;
}

.big{
font-size:72px;
font-weight:900;
color:#7c3aed;
line-height:1;
margin-top:10px;
}

.small{
margin-top:10px;
color:#888;
font-size:14px;
}

.notes{
margin-top:40px;
font-size:14px;
color:#666;
line-height:1.5;
}

@media(max-width:900px){
body{padding:30px;}
.container{grid-template-columns:1fr;}
.big{font-size:48px;}
}

</style>
</head>

<body>

<div class="container">

<div class="panel">

<h1>Paramètres</h1>

<label>Surface</label>
<input id="surface" type="number" value="500">

<label>Hauteur</label>
<input id="hauteur" type="number" value="8">

<label>Projet</label>
<select id="mode">
<option value="neuf">Neuf</option>
<option value="reno">Rénovation</option>
</select>

<label>Linéaire mur <span id="murValeur">60</span> ml</label>
<input id="mur" type="range" min="10" max="200" value="60">

<label>Parking</label>
<input id="parking" type="number" value="20">

<label>Vestiaires</label>
<select id="vest">
<option value="20000">Minimal</option>
<option value="40000">Standard</option>
<option value="80000">Confort</option>
</select>

<label>Niveau prestations</label>
<select id="prest">
<option value="1">Brut</option>
<option value="1.2">Normal</option>
<option value="1.4">Soigné</option>
</select>

<div class="checks">
<label><input id="chauff" type="checkbox"> Chauffage</label>
<label><input id="vent" type="checkbox"> Ventilation</label>
<label><input id="raf" type="checkbox"> Rafraîchissement</label>
</div>

</div>

<div class="result">

<div>Budget estimatif</div>

<div class="big" id="prix">0 €</div>

<div class="small" id="fourchette">0 — 0</div>

<div class="notes">
Estimation indicative basée sur les hypothèses renseignées.  
Une étude spécifique est nécessaire pour obtenir un budget fiable.  
Le mobilier, les équipements informatiques et les éléments hors bâtiment ne sont pas inclus.
</div>

</div>

</div>

<script>

const surface = document.getElementById("surface")
const hauteur = document.getElementById("hauteur")
const mode = document.getElementById("mode")
const mur = document.getElementById("mur")
const murValeur = document.getElementById("murValeur")
const parking = document.getElementById("parking")
const vest = document.getElementById("vest")
const prest = document.getElementById("prest")
const chauff = document.getElementById("chauff")
const vent = document.getElementById("vent")
const raf = document.getElementById("raf")
const prix = document.getElementById("prix")
const fourchette = document.getElementById("fourchette")

function euro(n){
return Math.round(n).toLocaleString("fr-FR")+" €"
}

function calc(){

let s=+surface.value||0
let h=+hauteur.value||0
let murml=+mur.value||0
let park=+parking.value||0
let vestc=+vest.value||0
let prestc=+prest.value||1

murValeur.innerHTML=murml

let batmin = mode.value=="neuf"?s*700:s*200
let batmax = mode.value=="neuf"?s*1300:s*400

let murbase = murml*4.9*1.2*240 +165*murml*3
let murmin=murbase
let murmax=murbase*1.2

let cvc=0
if(chauff.checked)cvc+=s/500*20000
if(vent.checked)cvc+=s/1000*170000
if(raf.checked)cvc+=s/1000*50000

let hauteurcout=h>6?(h-6)*s*35:0
let parkingcout=park*3500

let sousmin=batmin+murmin+cvc+hauteurcout+parkingcout+vestc
let sousmax=batmax+murmax+cvc+hauteurcout+parkingcout+vestc

let totalmin=sousmin*1.12*prestc
let totalmax=sousmax*1.12*prestc

let central=(totalmin+totalmax)/2

prix.innerHTML=euro(central)
fourchette.innerHTML=euro(totalmin)+" — "+euro(totalmax)

}

document.querySelectorAll("input,select").forEach(e=>{
e.oninput=calc
})

calc()

</script>

</body>
</html>
